<div class="login-container">
    <div *ngIf="isSuccess === false">
        <span>Email or password is incorrect</span>
    </div>
    <form method="post" (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <mat-card class="login-card">
            <mat-card-header>
                <h1 class="login-header">Login</h1>
            </mat-card-header>
            <mat-card-content class="login-fields">
                <mat-form-field>
                    <mat-label>Email</mat-label>
                    <input matInput name="email" required autocomplete="off" [(ngModel)]="user.email">
                </mat-form-field>
                <mat-form-field>
                    <mat-label>Password</mat-label>
                    <input matInput name="password" type="password" [(ngModel)]="user.password" required>
                </mat-form-field>
            </mat-card-content>
            <mat-card-actions class="login-btn">
                <button mat-flat-button color="primary" type="submit">Login</button>
            </mat-card-actions>
        </mat-card>
    </form>
</div>
